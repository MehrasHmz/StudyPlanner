version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: studyplanner-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: StudyPlanner
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
  api:
    build: { context: ., dockerfile: Dockerfile }
    container_name: studyplanner-api
    ports: ["8080:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=StudyPlanner;Username=postgres;Password=postgres
    depends_on:
      postgres: { condition: service_healthy }
volumes:
  postgres_data:
